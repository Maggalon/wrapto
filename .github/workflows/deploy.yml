name: Deploy to VPS

on:
  push:
    branches:
      - main # Change this if your default branch is 'master'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/wrapto
            
            # Pull latest changes from GitHub
            git pull origin main
            
            # Build the new Docker image
            docker build -t wrapto-app .
            
            # Stop and remove the old container
            docker stop wrapto-container || true
            docker rm wrapto-container || true
            
            # Run the new container
            docker run -d --name wrapto-container -p 3001:3000 --restart unless-stopped wrapto-app
            
            # Clean up old unused images to save disk space
            docker image prune -f